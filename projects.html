<!DOCTYPE html>
<html>
    <head>
        <title>My Portfolio</title>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    </head>
    <body>
        <header class="header">
            <h1 class="header-text">MY PROFESSIONAL JOURNEY</h1>
            <div class="right-nav">
                <nav>
                    <ul class="nav-links-header">
                        <li><a href="index.html" class="nav-btn">HOME</a></li>
                        <li><a href="aboutme.html" class="nav-btn">ABOUT ME</a></li>
                        <li><a href="projects.html" class="nav-btn active">PROJECTS</a></li>
                        <li><a href="contactme.html" class="nav-btn">CONTACT ME</a></li>
                        <img src="./image/Lynae.jpg" alt="Website Logo" class="site-logo">
                    </ul>
                </nav>
            </div>
        </header>
        <section class="hero-bg">
            <div class="project-content">
                <!-- IMAGE -->
                <div class="project-image-box project-enter">
                    <img id="projectImage" src="./image/chisa.jpg" class="project-img">
                </div>
                <h1 class="title_Page">PROJECTS</h1>

                <!-- TEXT -->
                <div class="project-text">
                    <div class="project-copy project-enter">
                        <h1 class="project-title" id="projectTitle"></h1>
                        <p class="project-description" id="projectDesc"></p>
                    </div>

                    <!-- CONTROLS -->
                    <div class="controls">
                        <div class="controls-group">
                            <button onclick="prevProject()" class="arrow" aria-label="Previous project">
                                <img src="./image/Arrow Left.png" alt="" class="arrow-icon">
                            </button>

                            <div class="dots" id="dots"></div>

                            <button onclick="nextProject()" class="arrow" aria-label="Next project">
                                <img src="./image/Arrow Right.png" alt="" class="arrow-icon">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script src="script.js"></script>
    </body>
</html>
